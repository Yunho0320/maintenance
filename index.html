<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아일랜드 스토리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .gif-wrap {
      margin-bottom: 1.5rem;
    }

    .gif-wrap img {
      width: min(200px, 60vw);
      height: auto;
      border-radius: 12px;
    }

    h1 {
      font-size: clamp(1.2rem, 5vw, 1.5rem);
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #1a202c;
    }

    .subtitle {
      font-size: clamp(0.85rem, 3.5vw, 0.95rem);
      color: #718096;
      line-height: 1.7;
      margin-bottom: 1.75rem;
    }

    .info-box {
      background: #ebf8ff;
      border: 1px solid #bee3f8;
      border-radius: 10px;
      padding: 0.875rem 1rem;
      font-size: clamp(0.8rem, 3vw, 0.875rem);
      color: #2b6cb0;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    .info-box strong {
      display: block;
      margin-bottom: 0.25rem;
      font-weight: 600;
    }

    .footer {
      font-size: clamp(0.75rem, 2.5vw, 0.8rem);
      color: #a0aec0;
    }

    .footer a {
      color: #63b3ed;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="gif-wrap">
      <img src="200.gif" alt="점검 중" />
    </div>
    <h1>서버 점검 중입니다</h1>
    <p class="subtitle">
      더 나은 서비스를 위해 시스템 점검을 진행하고 있습니다.<br />
      불편을 드려 죄송합니다. 곧 돌아오겠습니다.
    </p>
    <div class="info-box">
      <strong>예상 완료 시간</strong>
      <!-- Update this before activating maintenance mode -->
      2025년 00월 00일 오전 00:00 (한국 시각 기준)
    </div>
    <p class="footer">
      문의: <a href="mailto:polymorph0301@gmail.com">polymorph0301@gmail.com</a>
    </p>
  </div>
</body>
</html>
